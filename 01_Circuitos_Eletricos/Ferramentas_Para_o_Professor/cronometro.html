<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro de Aula - Lab AC Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chamada do arquivo central de senhas -->
    <script src="../../logins.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Fira+Code:wght@500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .timer-font { font-family: 'Fira Code', monospace; font-variant-numeric: tabular-nums; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; color: #ef4444; text-shadow: 0 0 20px rgba(239,68,68,0.5); } 50% { opacity: 0.5; text-shadow: none; } }
        .blink { animation: pulse-red 0.6s infinite; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <!-- CABEÇALHO PADRÃO -->
    <header class="bg-amber-600 text-white shadow-md py-4 px-6 relative z-10">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded shadow-sm text-amber-600 font-bold text-xl flex items-center justify-center h-12 w-12">
                    <i class="fa-solid fa-stopwatch"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide">ÁREA DO PROFESSOR</h1>
                    <p class="text-xs text-amber-100 font-medium">Cronômetro Dinâmico de Laboratório</p>
                </div>
            </div>
            <a href="../dic_circuitos_eletricos.html" class="text-sm font-semibold text-amber-50 hover:text-white bg-amber-700 hover:bg-amber-800 px-4 py-2 rounded transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao Portal
            </a>
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto p-4 md:p-6 flex flex-col items-center justify-center">

        <!-- TELA DE LOGIN -->
        <div id="screen-login" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-slate-200">
            <div class="text-center mb-6">
                <i class="fa-solid fa-lock text-4xl text-slate-300 mb-3"></i>
                <h2 class="text-2xl font-black text-slate-800">Acesso Restrito</h2>
                <p class="text-sm text-slate-500">Insira suas credenciais do IFRN para continuar.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Usuário</label>
                    <input type="text" id="username" class="w-full border border-slate-300 px-4 py-2 rounded-lg focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Senha</label>
                    <input type="password" id="password" class="w-full border border-slate-300 px-4 py-2 rounded-lg focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" onkeypress="if(event.key === 'Enter') checkLogin()">
                </div>
                
                <div id="login-error" class="hidden text-xs text-rose-500 font-bold text-center bg-rose-50 p-2 rounded border border-rose-200"></div>
                
                <button onclick="checkLogin()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-lg shadow transition-colors mt-2">
                    Entrar no Cronômetro
                </button>
            </div>
        </div>

        <!-- PAINEL DO CRONÔMETRO -->
        <div id="main-panel" class="hidden flex-col items-center w-full max-w-4xl bg-slate-900 rounded-[2rem] shadow-2xl p-8 md:p-16 border border-slate-800 relative overflow-hidden">
            
            <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-transparent via-amber-500 to-transparent opacity-50"></div>

            <div id="timerDisplay" class="timer-font text-[100px] md:text-[180px] font-black text-white mb-10 leading-none tracking-tight">00:00</div>
            
            <div class="grid grid-cols-4 gap-3 mb-10 w-full max-w-2xl">
                <button onclick="addTime(0.5)" class="bg-slate-800 hover:bg-slate-700 py-3 md:py-4 rounded-xl font-bold text-slate-300 hover:text-white text-sm md:text-base border border-slate-700 transition-colors">+30s</button>
                <button onclick="addTime(1)" class="bg-slate-800 hover:bg-slate-700 py-3 md:py-4 rounded-xl font-bold text-slate-300 hover:text-white text-sm md:text-base border border-slate-700 transition-colors">+1m</button>
                <button onclick="addTime(5)" class="bg-slate-800 hover:bg-slate-700 py-3 md:py-4 rounded-xl font-bold text-slate-300 hover:text-white text-sm md:text-base border border-slate-700 transition-colors">+5m</button>
                <button onclick="addTime(10)" class="bg-slate-800 hover:bg-slate-700 py-3 md:py-4 rounded-xl font-bold text-slate-300 hover:text-white text-sm md:text-base border border-slate-700 transition-colors">+10m</button>
            </div>

            <div class="flex flex-col md:flex-row gap-4 w-full max-w-2xl">
                <button onclick="startTimer()" id="btnStart" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 md:py-5 rounded-2xl text-white font-black text-lg md:text-xl uppercase shadow-[0_0_15px_rgba(5,150,105,0.4)] transform active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-play"></i> Iniciar
                </button>
                <button onclick="resetTimer()" id="btnReset" class="flex-1 bg-rose-600 hover:bg-rose-500 py-4 md:py-5 rounded-2xl text-white font-black text-lg md:text-xl uppercase shadow-[0_0_15px_rgba(225,29,72,0.4)] transform active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-stop"></i> Parar / Reset
                </button>
            </div>
        </div>

    </main>

    <footer class="bg-slate-900 text-slate-400 text-center py-4 text-xs border-t border-slate-800 mt-auto w-full">
        Material de Apoio Didático — Desenvolvido para o Curso Técnico em Eletrotécnica IFRN
    </footer>

    <script>
        let timeLeft = 0;
        let timerInterval = null;

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            const auth = AuthProfessor.validarDetalhado(u, p);
            
            if(auth.sucesso) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                document.getElementById('main-panel').classList.add('flex');
                errorDiv.classList.add('hidden');
            } else {
                errorDiv.innerText = auth.erro;
                errorDiv.classList.remove('hidden');
            }
        }

        function addTime(m) {
            timeLeft += m * 60;
            updateDisplay();
        }

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60);
            let s = Math.floor(timeLeft % 60);
            const display = document.getElementById('timerDisplay');
            
            if(timeLeft > 0) {
                display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (timeLeft <= 10) {
                    display.classList.add('blink');
                    display.classList.remove('text-white');
                } else {
                    display.classList.remove('blink');
                    display.classList.remove('text-rose-500');
                    display.classList.add('text-white');
                }
            }
        }

        function startTimer() {
            if (timerInterval || timeLeft <= 0) return;
            const btnStart = document.getElementById('btnStart');
            btnStart.innerHTML = '<i class="fa-solid fa-pause"></i> Em Andamento';
            btnStart.classList.replace('bg-emerald-600', 'bg-amber-500');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    const display = document.getElementById('timerDisplay');
                    display.innerText = "ACABOU!";
                    display.classList.remove('blink');
                    display.classList.remove('text-white');
                    display.classList.add('text-rose-500');
                    resetButtons();
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timeLeft = 0;
            const display = document.getElementById('timerDisplay');
            display.innerText = "00:00";
            display.classList.remove('blink', 'text-rose-500');
            display.classList.add('text-white');
            resetButtons();
        }

        function resetButtons() {
            const btnStart = document.getElementById('btnStart');
            btnStart.innerHTML = '<i class="fa-solid fa-play"></i> Iniciar';
            btnStart.classList.replace('bg-amber-500', 'bg-emerald-600');
        }
    </script>
</body>
</html>
